<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACFU • Roblox Football League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .page { min-height: 100vh; }
  </style>
</head>
<body class="bg-white">

  <!-- Navbar -->
  <nav class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-x-3">
          <img src="https://cdn.discordapp.com/emojis/1510080195653271603.png" alt="ACFU Logo" class="w-10 h-10">
          <span class="font-bold text-2xl tracking-tighter">ACFU</span>
        </div>
        <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
          <a href="#" onclick="showPage('home')" class="hover:text-blue-600">Home</a>
          <a href="#" onclick="showPage('rankings')" class="hover:text-blue-600">Rankings</a>
          <a href="#" onclick="showPage('scores')" class="hover:text-blue-600">Scores</a>
          <a href="#" onclick="showPage('stats')" class="hover:text-blue-600">Stats</a>
          <a href="#" onclick="showPage('rulebook')" class="hover:text-blue-600">Rulebook</a>
        </div>
        <a href="https://discord.gg/BgndbX7mQT" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-full">
          Enroll Now
        </a>
      </div>
    </div>
  </nav>

  <!-- HOME PAGE - Compact -->
  <div id="home" class="page">
    <div class="bg-[url('https://picsum.photos/id/1015/2000/1200')] bg-cover bg-center h-[580px] flex items-center text-white relative">
      <div class="max-w-screen-xl mx-auto px-6">
        <div class="max-w-2xl">
          <h1 class="text-6xl font-bold leading-none tracking-tighter mb-6">START YOUR JOURNEY</h1>
          <p class="text-xl mb-8">Ready to put your name on the map?<br>Start your Roblox football career today!</p>
          <a href="https://discord.gg/BgndbX7mQT" class="inline-block px-8 py-4 bg-white text-blue-600 font-semibold rounded-full text-lg hover:bg-gray-100">
            Enroll Now
          </a>
        </div>
      </div>
    </div>

    <!-- Blue Register Bar -->
    <div class="bg-blue-600 py-8 text-white">
      <div class="max-w-screen-xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
        <h2 class="text-3xl font-bold">GET REGISTERED NOW!</h2>
        <a href="https://discord.gg/BgndbX7mQT" class="px-10 py-4 bg-white text-blue-600 font-semibold rounded-full text-lg hover:bg-gray-100">
          Register
        </a>
      </div>
    </div>
  </div>

  <!-- SCORES PAGE -->
  <div id="scores" class="page hidden max-w-screen-xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-bold mb-8">Scores</h2>
    <div class="flex gap-3 mb-8 overflow-x-auto pb-2">
      <button onclick="showWeek(1)" class="week-btn active px-8 py-3 bg-blue-600 text-white rounded-full whitespace-nowrap">Week 1</button>
      <button onclick="showWeek(2)" class="week-btn px-8 py-3 bg-gray-200 hover:bg-gray-300 rounded-full whitespace-nowrap">Week 2</button>
      <!-- Add more weeks as needed -->
    </div>

    <div id="week-content" class="space-y-12">
      <!-- Week content will be loaded by JS -->
    </div>
  </div>

  <!-- STATS PAGE -->
  <div id="stats" class="page hidden max-w-screen-xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-bold mb-10 text-center">League Stats</h2>
    
    <div class="flex flex-wrap gap-3 mb-10 justify-center">
      <button onclick="showPosition('QB')" class="pos-btn active px-6 py-3 bg-blue-600 text-white rounded-full">QB</button>
      <button onclick="showPosition('RB')" class="pos-btn px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-full">RB</button>
      <button onclick="showPosition('WR')" class="pos-btn px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-full">WR</button>
      <button onclick="showPosition('TE')" class="pos-btn px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-full">TE</button>
      <button onclick="showPosition('C')" class="pos-btn px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-full">C</button>
      <button onclick="showPosition('DE')" class="pos-btn px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-full">DE</button>
      <button onclick="showPosition('LB')" class="pos-btn px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-full">LB</button>
      <button onclick="showPosition('DB')" class="pos-btn px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-full">DB</button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-sm border-collapse" id="stats-table">
        <thead class="bg-gray-100">
          <tr id="stats-header"></tr>
        </thead>
        <tbody id="stats-body" class="divide-y"></tbody>
      </table>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-10 text-sm mt-auto">
    <div class="max-w-screen-xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-y-6">
      <div class="flex items-center gap-x-6 text-2xl">
        <a href="https://discord.gg/BgndbX7mQT" class="hover:text-white"><i class="fab fa-discord"></i></a>
        <a href="#" class="hover:text-white"><i class="fab fa-youtube"></i></a>
      </div>
      <div class="flex flex-wrap gap-x-8 gap-y-2 justify-center">
        <a href="#" onclick="showPage('home')" class="hover:text-white">Home</a>
        <a href="#" onclick="showPage('rankings')" class="hover:text-white">Rankings</a>
        <a href="#" onclick="showPage('scores')" class="hover:text-white">Scores</a>
        <a href="#" onclick="showPage('stats')" class="hover:text-white">Stats</a>
        <a href="#" onclick="showPage('rulebook')" class="hover:text-white">Rulebook</a>
      </div>
      <div>© 2026 ACFU</div>
    </div>
  </footer>

  <script>
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
      document.getElementById(pageId).classList.remove('hidden');
      window.scrollTo(0, 0);
    }

    // Simple week navigation example
    function showWeek(week) {
      document.querySelectorAll('.week-btn').forEach(btn => btn.classList.remove('active', 'bg-blue-600', 'text-white'));
      event.target.classList.add('active', 'bg-blue-600', 'text-white');
      // You can expand this with real data later
      alert(`Showing Week ${week} scores (add your data here)`);
    }

    function showPosition(pos) {
      document.querySelectorAll('.pos-btn').forEach(btn => btn.classList.remove('active', 'bg-blue-600', 'text-white'));
      event.target.classList.add('active', 'bg-blue-600', 'text-white');
      alert(`Showing ${pos} stats (add your table data here)`);
    }

    window.onload = () => showPage('home');
  </script>
</body>
</html>
