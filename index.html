<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }

  </style>
</head>
<body class="bg-white">

  <!-- Navbar -->
  <nav class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-x-3">
          <img src="https://cdn.discordapp.com/emojis/1510080195653271603.png" alt="ACFU Logo" class="w-10 h-10">
          <span class="font-bold text-2xl tracking-tighter">ACFU</span>
        </div>
        <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
          <a href="#" onclick="showPage('home')" class="hover:text-[#76FF84]">Home</a>
          <a href="#" onclick="showPage('rankings')" class="hover:text-[#76FF84]">Rankings</a>
          <a href="#" onclick="showPage('scores')" class="hover:text-[#76FF84]">Scores</a>

          <a href="#" onclick="showPage('rulebook')" class="hover:text-[#76FF84]">Rulebook</a>
        </div>
        <a href="https://discord.gg/BgndbX7mQT" class="px-6 py-2 bg-[#76FF84] hover:bg-green-400 text-black font-semibold rounded-full">
          Enroll Now
        </a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero-bg bg-cover bg-center h-screen flex items-center text-white">
    <div class="max-w-screen-xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div>
        <h1 class="text-6xl font-bold leading-none tracking-tighter mb-6">START YOUR JOURNEY</h1>
        <p class="text-xl mb-8">Ready to put your name on the map?<br>Start your Roblox football career today!</p>
        <a href="https://discord.gg/BgndbX7mQT" class="inline-block px-8 py-4 bg-white text-black font-semibold rounded-full text-lg hover:bg-gray-100">
          Enroll Now
        </a>
      </div>
    </div>
  </div>

  <!-- Green Bar with new background -->
  <div class="bg-gradient-to-r from-green-600 to-emerald-500 py-14 text-white relative overflow-hidden">
    <div class="max-w-screen-xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
      <h2 class="text-4xl font-bold">GET REGISTERED NOW!</h2>
      <a href="https://discord.gg/BgndbX7mQT" class="px-10 py-4 bg-white text-[#76FF84] font-semibold rounded-full text-lg hover:bg-gray-100">
        Register
      </a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-12 text-sm mt-auto">
    <div class="max-w-screen-xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-y-8">
      <div class="flex items-center gap-x-6 text-2xl">
        <a href="https://discord.gg/BgndbX7mQT" class="hover:text-white"><i class="fab fa-discord"></i></a>
        <a href="#" class="hover:text-white"><i class="fab fa-youtube"></i></a>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-x-12 text-sm">
        <div class="space-y-2">
          <a href="#" onclick="showPage('home')" class="hover:text-white block">Home</a>
          <a href="#" onclick="showPage('scores')" class="hover:text-white block">Scores</a>
        </div>
        <div class="space-y-2">
          <a href="#" onclick="showPage('rankings')" class="hover:text-white block">Rankings</a>
          <a href="#" onclick="showPage('stats')" class="hover:text-white block">Stats</a>
        </div>
        <div class="space-y-2">
          <a href="#" onclick="showPage('rulebook')" class="hover:text-white block">Rulebook</a>
          <a href="#" onclick="showPage('schoolbooks')" class="hover:text-white block">Schoolbooks</a>
        </div>
      </div>
      <div>© 2026 ACFU</div>
    </div>
  </footer>

  <script>
    function showPage(pageId) {
      alert("Navigating to " + pageId);
    }
  </script>
</body>
</html>
